<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="shortcut icon" href="/favicon.png">
<title>AI Visibility Report — Attomik</title>
<meta name="robots" content="noindex"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--surface:#0d0d0d;--surface2:#161616;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.18);
  --text:#ffffff;--muted:#bbbbbb;--accent:#00ff97;
  --accent-dim:rgba(0,255,151,0.1);--accent-border:rgba(0,255,151,0.25);
  --danger:#ef4444;--warn:#f59e0b;--ok:#00cc78;
}
html{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
body{min-height:100vh;overflow-x:hidden}

/* TOP BAR */
.topbar{
  border-bottom:1px solid var(--border);padding:0 2rem;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,0.92);backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}
.topbar-logo{font-family:'Barlow',sans-serif;font-size:16px;font-weight:900;color:#fff;text-decoration:none;letter-spacing:-0.03em;}
.topbar-cta{background:var(--accent);color:#000;font-family:'Barlow',sans-serif;font-size:13px;font-weight:800;padding:8px 18px;border-radius:6px;text-decoration:none;white-space:nowrap;letter-spacing:-0.01em;}

/* SHARED BANNER */
.shared-banner{
  background:var(--surface);border-bottom:1px solid var(--accent-border);
  padding:14px 2rem;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;text-align:center;
}
.shared-banner-text{font-size:14px;color:rgba(255,255,255,0.7);}
.shared-banner-text strong{color:var(--accent);}
.shared-banner-btn{
  background:transparent;border:1px solid var(--accent);color:var(--accent);
  font-family:'DM Mono',monospace;font-size:11px;padding:6px 16px;border-radius:6px;
  text-decoration:none;white-space:nowrap;letter-spacing:0.04em;
}

/* MAIN */
.wrap{max-width:860px;margin:0 auto;padding:2.5rem 2rem 6rem;}

/* SCORE */
.score-hero{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:2.5rem;text-align:center;margin-bottom:1.5rem;
}
.score-label{font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.5);margin-bottom:8px;}
.score-num{font-family:'Barlow',sans-serif;font-size:clamp(80px,16vw,120px);font-weight:800;letter-spacing:-0.05em;line-height:1;}
.score-denom{font-size:0.4em;color:#333;font-weight:400;}
.score-verdict{font-size:16px;color:rgba(255,255,255,0.6);margin-top:8px;}
.score-stats{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem;}
.sstat-num{font-family:'Barlow',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.04em;line-height:1;}
.sstat-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.4);margin-top:3px;}

/* BARS */
.bars{margin-bottom:1.5rem;}
.bar-row{margin-bottom:10px;}
.bar-lbl{display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:5px;}
.bar-track{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}

hr{border:none;border-top:1px solid var(--border);margin:1.75rem 0;}

/* ENGINES */
.section-label-sm{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);margin-bottom:4px;}
.section-sub{font-size:15px;color:rgba(255,255,255,0.65);margin-bottom:1.25rem;}
.engines-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.engine-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.engine-name{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.5);margin-bottom:8px;}
.engine-pct{font-family:'Barlow',sans-serif;font-size:36px;font-weight:800;letter-spacing:-0.04em;line-height:1;}
.engine-pct span{font-size:18px;}
.engine-status{font-size:11px;margin-top:4px;}

/* ISSUES */
.issues-list{display:flex;flex-direction:column;gap:8px;}
.issue-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}
.issue-icon{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.ii-danger{background:rgba(255,87,87,0.18);color:var(--danger);}
.ii-warn{background:rgba(255,179,71,0.18);color:var(--warn);}
.issue-headline{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;}
.issue-why{font-size:13px;color:rgba(255,255,255,0.7);line-height:1.55;}

/* CTA */
.cta-section{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:2.5rem;text-align:center;margin-top:2rem;}
.cta-section h2{font-family:'Barlow',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.04em;margin-bottom:0.5rem;line-height:1.1;}
.cta-section h2 em{font-style:normal;color:var(--accent);}
.cta-section p{color:rgba(255,255,255,0.65);font-size:14px;max-width:380px;margin:0 auto 1.5rem;line-height:1.65;}
.cta-btn{display:inline-block;background:var(--accent);color:#000;font-family:'Barlow',sans-serif;font-size:15px;font-weight:800;padding:13px 32px;border-radius:8px;text-decoration:none;letter-spacing:-0.02em;}
.powered{text-align:center;font-size:11px;color:#333;margin-top:2rem;font-family:'DM Mono',monospace;letter-spacing:0.05em;}
.powered a{color:#444;text-decoration:none;}

/* LOADING */
.loading{text-align:center;padding:6rem 2rem;}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:ld 0.8s ease-in-out infinite alternate;}
.loading-dot:nth-child(2){animation-delay:0.15s;}
.loading-dot:nth-child(3){animation-delay:0.3s;}
@keyframes ld{from{opacity:0.3;transform:translateY(0)}to{opacity:1;transform:translateY(-8px)}}

.error{text-align:center;padding:6rem 2rem;color:var(--muted);}
.error h2{font-family:'Barlow',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.03em;color:#fff;margin-bottom:0.75rem;}

/* SHARE */
.share-bar{text-align:center;margin-top:1.5rem;}
.share-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:transparent;border:1px solid var(--border2);color:var(--muted);
  font-family:'DM Mono',monospace;font-size:12px;padding:10px 20px;
  border-radius:8px;cursor:pointer;letter-spacing:0.04em;transition:all 0.2s;
}
.share-btn:hover{border-color:var(--accent);color:var(--accent);}
.share-btn.copied{border-color:var(--accent);color:var(--accent);}
.share-toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--accent);color:#000;
  font-family:'DM Mono',monospace;font-size:13px;font-weight:700;
  padding:10px 24px;border-radius:8px;
  opacity:0;transition:opacity 0.2s ease,transform 0.2s ease;
  pointer-events:none;z-index:999;white-space:nowrap;
}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

@media(max-width:640px){
  .engines-grid{grid-template-columns:repeat(2,1fr);}
  .topbar{padding:0 1rem;}
  .wrap{padding:1.5rem 1rem 5rem;}
  .score-stats{gap:1.25rem;}
}
</style>
</head>

<div class="shared-banner" id="sharedBanner" style="display:none;">
  <span class="shared-banner-text">You're viewing a shared AI Visibility Report. <strong>Want to see yours?</strong></span>

<div class="wrap" id="main">
  <div class="loading">
    <div style="margin-bottom:1.5rem;">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:0.08em;text-transform:uppercase;">Loading report</div>
  </div>
</div>

<script>
(async () => {
  const token = window.location.pathname.split('/').filter(Boolean).pop();
  const main  = document.getElementById('main');
  const params = new URLSearchParams(window.location.search);
  const isVerified = params.get('verified') === 'true';

  if (!token) {
    main.innerHTML = '<div class="error"><h2>Report not found</h2><p>This link may be invalid or expired.</p></div>';
    return;
  }

  // Show shared banner only if NOT the verified owner clicking from email
  if (!isVerified) {
    document.getElementById('sharedBanner').style.display = 'flex';
  }

  let report;
  try {
    const res = await fetch(`/api/get-report/${token}`);
    if (!res.ok) throw new Error('not found');
    report = await res.json();
  } catch {
    main.innerHTML = `<div class="error">
      <h2>Report not found</h2>
      <p>This link may be invalid or has expired.</p>
      <a href="https://audit.attomik.co" style="color:var(--accent);font-family:'DM Mono',monospace;font-size:13px;margin-top:1rem;display:inline-block;">Run a free audit &rarr;</a>
    </div>`;
    return;
  }

  // Mark lead as verified (fire and forget)
  fetch('/api/verify-email', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token }),
  }).catch(() => {});

  const {
    domain, combined_score: combined, ai_score: aiScore, seo_score: seoScore,
    crit_count: critCount, warn_count: warnCount,
    issues_json: issues = [], engines_json: engines = [],
  } = report;

  const thr = (v) => v >= 80 ? '#00cc78' : v >= 45 ? '#f59e0b' : '#ef4444';
  const sc = thr(combined);
  const verdict = combined >= 80 ? 'Decent foundation — but gaps exist'
    : combined >= 45 ? 'Largely invisible to AI search' : 'AI cannot confidently recommend this brand';

  const reportId = 'ATM-' + Math.floor(1000 + Math.random() * 9000) + '-' + domain.replace(/[^a-z0-9]/gi,'').slice(-3).toUpperCase();
  const reportDate = new Date().toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'});

  const aiSaysResponse = combined >= 80
    ? `"${domain} is a recognized brand in its space. They offer a range of products and are known for their online presence and quality. You can find them at ${domain}."`
    : combined >= 60
    ? `"I've seen some references to ${domain} online, though I don't have detailed information about their specific products or brand positioning. You may want to visit their website directly for more information."`
    : combined >= 40
    ? `"I don't have reliable information about ${domain} in my training data. I'd recommend searching directly or checking recent reviews to learn more about this brand."`
    : `"I'm not familiar with ${domain}. I don't have enough information to make a recommendation about this brand."`;
  const aiSaysColor = combined >= 80 ? 'rgba(255,255,255,0.85)' : combined >= 60 ? 'rgba(255,255,255,0.7)' : combined >= 40 ? '#f59e0b' : '#ef4444';
  const aiSaysLabel = combined >= 80 ? '\u2713 ChatGPT has strong knowledge of your brand.'
    : combined >= 60 ? '\u26A0\uFE0F ChatGPT has limited knowledge of your brand.'
    : combined >= 40 ? '\u26A0\uFE0F ChatGPT struggles to find your brand.'
    : '\uD83D\uDEA8 ChatGPT does not know your brand. This is what your customers see.';
  const aiSaysLabelColor = combined >= 80 ? '#00cc78' : combined >= 60 ? 'rgba(255,255,255,0.5)' : '#f59e0b';

  const enginesHtml = engines.map(e => `
    <div class="engine-card">
      <div class="engine-name">${e.name}</div>
      <div class="engine-pct" style="color:${thr(e.pct)};">${e.pct}<span>%</span></div>
      <div class="engine-status" style="color:${thr(e.pct)};">${e.label}</div>
    </div>`).join('');

  const issuesHtml = issues.map(issue => `
    <div class="issue-item">
      <div class="issue-icon ii-${issue.sev}">${issue.sev === 'danger' ? '!' : '~'}</div>
      <div>
        <div class="issue-headline">${issue.headline}</div>
        <div class="issue-why">${issue.why}</div>
      </div>
    </div>`).join('');

  const compareText = combined >= 80
    ? "You're in the top 12% of brands we've audited. Most still have room to improve."
    : combined >= 60
    ? "You're above average — but 88% of buyers' AI queries still won't surface you."
    : combined >= 40
    ? `You score near the average of ${combined}/100. Most CPG brands are in the same boat.`
    : "You're in the bottom tier — but this is fixable. Every issue has a solution.";
  const markerLeft = Math.max(2, Math.min(96, combined));

  const whatWeCheckItems = [
    ['🏗', 'Structured Data', '+25 pts'],
    ['📝', 'Content Depth', '+18 pts'],
    ['🔍', 'Meta Signals', '+15 pts'],
    ['🔗', 'Open Graph', '+10 pts'],
    ['🖼', 'Image Alt Text', '+8 pts'],
    ['⚡', 'Technical SEO', '+8 pts'],
  ].map(([icon, name, pts]) => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
      <span style="font-size:14px;">${icon}</span>
      <span style="font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;color:#fff;flex:1;">${name}</span>
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:#00ff97;background:rgba(0,255,151,0.08);padding:1px 6px;border-radius:4px;">${pts}</span>
    </div>`).join('');

  const scoreContextHtml = `
    <div style="background:#0d0d0d;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;">
      <div style="flex:1;min-width:200px;">
        <div style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#00ff97;margin-bottom:6px;">HOW YOU COMPARE</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.7);line-height:1.55;">${compareText}</div>
      </div>
      <div style="flex-shrink:0;min-width:200px;">
        <div style="position:relative;width:200px;height:6px;border-radius:99px;overflow:hidden;display:flex;margin-bottom:8px;">
          <div style="width:40%;background:#ef4444;"></div>
          <div style="width:30%;background:#f59e0b;"></div>
          <div style="width:30%;background:#00cc78;"></div>
        </div>
        <div style="position:relative;width:200px;height:10px;margin-top:-14px;margin-bottom:6px;">
          <div style="position:absolute;left:${markerLeft}%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid #000;"></div>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3);display:flex;justify-content:space-between;width:200px;">
          <span>0 ← Critical</span><span>Average</span><span>Good → 100</span>
        </div>
      </div>
    </div>
    <div style="margin-bottom:1.5rem;">
      <div style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#00ff97;margin-bottom:10px;">WHAT WE CHECK</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;">
        ${whatWeCheckItems}
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,0.3);margin-top:10px;">
        Total: 100 points. Scores above 70 mean AI can confidently recommend your brand.
      </div>
    </div>`;

  // Update page title
  document.title = `AI Visibility Report: ${domain} scored ${combined}/100 — Attomik`;

    <div style="background:#0d0d0d;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;">

      <div style="font-size:15px;color:${aiSaysColor};line-height:1.7;font-family:'Barlow',sans-serif;">

  const shareUrl = window.location.origin + '/r/' + token;
  document.getElementById('shareBtn')?.addEventListener('click', () => {
    navigator.clipboard.writeText(shareUrl).then(() => {
      const btn = document.getElementById('shareBtn');
      btn.classList.add('copied');
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3 3 7-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Link copied!';
      // Show toast
      let toast = document.getElementById('shareToast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'shareToast';
        toast.className = 'share-toast';
        toast.textContent = 'Report link copied to clipboard';
        document.body.appendChild(toast);
      }
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => {
        toast.classList.remove('show');
        btn.classList.remove('copied');
        btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="13" cy="2.5" r="1.5" stroke="currentColor" stroke-width="1.5"/><circle cx="13" cy="13.5" r="1.5" stroke="currentColor" stroke-width="1.5"/><circle cx="2.5" cy="8" r="1.5" stroke="currentColor" stroke-width="1.5"/><line x1="4" y1="8" x2="11.5" y2="3.2" stroke="currentColor" stroke-width="1.3"/><line x1="4" y1="8" x2="11.5" y2="12.8" stroke="currentColor" stroke-width="1.3"/></svg> Share this report';

function toggleFixForm() {
  const form = document.getElementById('fixForm');
  const btn = document.getElementById('fixCTABtn');
  if (!form) return;
  const isOpen = form.style.maxHeight !== '0px' && form.style.maxHeight !== '';
  if (isOpen) {
    form.style.maxHeight = '0';
    form.style.opacity = '0';
    btn.textContent = 'Get Attomik to fix this \u2192';
  } else {
    form.style.maxHeight = '400px';
    form.style.opacity = '1';
    btn.textContent = 'Never mind';
    setTimeout(() => document.getElementById('fixName')?.focus(), 400);
  }
}

async function submitFixForm(domain, combined, critCount) {
  const name  = document.getElementById('fixName')?.value.trim();
  const email = document.getElementById('fixEmail')?.value.trim();
  const btn   = document.getElementById('fixSubmitBtn');
  if (!name) { document.getElementById('fixName').style.borderColor = '#ef4444'; return; }
  if (!email || !email.includes('@')) { document.getElementById('fixEmail').style.borderColor = '#ef4444'; return; }
  btn.textContent = 'Sending...';
  btn.disabled = true;
  try {
    await fetch('/api/send-report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email, name, domain,
        url: 'https://' + domain,
        combined, critCount,
        aiScore: 0, seoScore: 0, warnCount: 0,
        issues: [], engines: [],
        source: 'shared-report-cta',
      }),
    });
  } catch(e) { console.warn(e); }
  const form = document.getElementById('fixForm');
  if (form) form.innerHTML = `
    <div style="text-align:center;padding:1.5rem 0;">
      <div style="font-size:28px;margin-bottom:0.75rem;">\u2713</div>
      <div style="font-family:'Barlow',sans-serif;font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.02em;margin-bottom:6px;">
        You're on our radar, ${name.split(' ')[0]}.
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,0.4);line-height:1.6;">
        Someone from Attomik will review your results<br>and reach out within 1 business day.
      </div>
    </div>`;
}
